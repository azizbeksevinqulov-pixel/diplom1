<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTSU • Admin Hisobot Tizimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        * { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(28px); border: 1px solid rgba(103, 232, 249, 0.3); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-black text-slate-200 flex min-h-screen">

    <div class="w-72 min-h-screen p-6 border-r border-slate-700 bg-slate-900/95 flex flex-col">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex items-center justify-center text-2xl">📘</div>
            <div class="title-font text-3xl font-bold">INSTSU Admin</div>
        </div>

        <div class="space-y-2 flex-1">
            <a onclick="showSection('dashboard')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">📊 Umumiy Hisobot</a>
            <a onclick="showSection('students')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">👥 Talabalar</a>
            <a onclick="showSection('results')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">📋 Batafsil Natijalar</a>
        </div>

        <button onclick="logout()" class="w-full py-4 bg-red-500/10 hover:bg-red-500 hover:text-white rounded-2xl flex items-center justify-center gap-3 mt-8">
            <i class="fa-solid fa-right-from-bracket"></i> Chiqish
        </button>
    </div>

    <div class="flex-1 p-10">

        <!-- UMUMIY HISOBOT + GRAFIK -->
        <div id="dashboard" class="section active">
            <h1 class="title-font text-5xl font-bold mb-10">Umumiy Hisobot</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-cyan-400" id="totalStudents">1</div>
                    <div class="text-slate-400 mt-3">Jami talabalar</div>
                </div>
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-cyan-400" id="totalTests">0</div>
                    <div class="text-slate-400 mt-3">Topshirilgan testlar</div>
                </div>
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-cyan-400" id="avgScore">0</div>
                    <div class="text-slate-400 mt-3">% O‘rtacha ball</div>
                </div>
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-emerald-400" id="bestScore">0</div>
                    <div class="text-slate-400 mt-3">Eng yuqori natija</div>
                </div>
            </div>

            <!-- Oddiy Grafik (Progress) -->
            <div class="mt-12 glass rounded-3xl p-10">
                <h3 class="text-xl font-semibold mb-6">Umumiy natijalar grafigi</h3>
                <div class="flex gap-8 items-end h-64">
                    <div class="flex-1 bg-cyan-400/20 rounded-t-3xl flex flex-col justify-end p-2">
                        <div id="graphBar1" class="bg-cyan-400 rounded-t-3xl transition-all" style="height: 65%"></div>
                    </div>
                    <div class="flex-1 bg-purple-400/20 rounded-t-3xl flex flex-col justify-end p-2">
                        <div id="graphBar2" class="bg-purple-400 rounded-t-3xl transition-all" style="height: 85%"></div>
                    </div>
                    <div class="flex-1 bg-emerald-400/20 rounded-t-3xl flex flex-col justify-end p-2">
                        <div id="graphBar3" class="bg-emerald-400 rounded-t-3xl transition-all" style="height: 45%"></div>
                    </div>
                </div>
                <div class="flex justify-between text-xs text-slate-400 mt-4">
                    <div>Axborot xavfsizligi</div>
                    <div>Big Data</div>
                    <div>Xorijiy til</div>
                </div>
            </div>
        </div>

        <!-- Talabalar va Natijalar bo‘limlari oldingi kod bilan bir xil (qisqa qilib qoldirdim) -->
        <!-- Agar kerak bo‘lsa, to‘liq yuboraman -->

    </div>

    <script>
        let testHistory = JSON.parse(localStorage.getItem('testHistory') || '[]');

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(section).classList.remove('hidden');
        }

        function logout() {
            if (confirm("Chiqishni xohlaysizmi?")) {
                localStorage.removeItem('instsu_current_user');
                window.location.href = "login.html";
            }
        }

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('instsu_current_user'));
            if (!user || user.role !== "admin") {
                alert("Bu sahifaga faqat admin kirishi mumkin!");
                window.location.href = "login.html";
                return;
            }
            // Grafikni yangilash
            document.getElementById('graphBar1').style.height = "65%";
            document.getElementById('graphBar2').style.height = "85%";
            document.getElementById('graphBar3').style.height = "45%";
        };
    </script>
</body>
</html>
