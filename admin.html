<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTSU • Admin Hisobot Tizimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        * { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(28px); border: 1px solid rgba(103, 232, 249, 0.3); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-black text-slate-200 flex min-h-screen">

    <div class="w-72 min-h-screen p-6 border-r border-slate-700 bg-slate-900/95 flex flex-col">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex items-center justify-center text-2xl">📘</div>
            <div class="title-font text-3xl font-bold">INSTSU Admin</div>
        </div>

        <div class="space-y-2 flex-1">
            <a onclick="showSection('dashboard')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">📊 Umumiy Hisobot</a>
            <a onclick="showSection('students')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">👥 Talabalar</a>
            <a onclick="showSection('results')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">📋 Natijalar</a>
        </div>

        <button onclick="logout()" class="w-full py-4 bg-red-500/10 hover:bg-red-500 hover:text-white rounded-2xl flex items-center justify-center gap-3 mt-8">
            <i class="fa-solid fa-right-from-bracket"></i> Chiqish
        </button>
    </div>

    <div class="flex-1 p-10">

        <div id="dashboard" class="section active">
            <h1 class="title-font text-5xl font-bold mb-10">Umumiy Hisobot</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-cyan-400" id="totalStudents">1</div>
                    <div class="text-slate-400 mt-3">Jami talabalar</div>
                </div>
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-cyan-400" id="totalTests">0</div>
                    <div class="text-slate-400 mt-3">Topshirilgan testlar</div>
                </div>
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-cyan-400" id="avgScore">0</div>
                    <div class="text-slate-400 mt-3">% O‘rtacha ball</div>
                </div>
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="text-6xl font-bold text-emerald-400" id="bestScore">0</div>
                    <div class="text-slate-400 mt-3">Eng yuqori natija</div>
                </div>
            </div>
        </div>

        <div id="students" class="section hidden">
            <h2 class="title-font text-4xl font-bold mb-8">Talabalar ro‘yxati</h2>
            <div id="studentsTable" class="glass rounded-3xl overflow-hidden"></div>
        </div>

        <div id="results" class="section hidden">
            <h2 class="title-font text-4xl font-bold mb-8">Barcha test natijalari</h2>
            <div id="resultsList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let testHistory = JSON.parse(localStorage.getItem('testHistory') || '[]');

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(section).classList.remove('hidden');

            if (section === 'students') renderStudents();
            if (section === 'results') renderResults();
            if (section === 'dashboard') renderDashboard();
        }

        function renderDashboard() {
            const totalTests = testHistory.length;
            let totalScore = 0;
            let bestScore = 0;

            testHistory.forEach(item => {
                totalScore += item.percent;
                if (item.percent > bestScore) bestScore = item.percent;
            });

            const avgScore = totalTests > 0 ? Math.round(totalScore / totalTests) : 0;

            document.getElementById('totalStudents').textContent = "1";
            document.getElementById('totalTests').textContent = totalTests;
            document.getElementById('avgScore').textContent = avgScore;
            document.getElementById('bestScore').textContent = bestScore;
        }

        function renderStudents() {
            let html = `<table class="w-full"><thead class="bg-slate-800"><tr>
                <th class="px-8 py-5 text-left">Ism</th>
                <th class="px-8 py-5 text-left">Kurs</th>
                <th class="px-8 py-5 text-center">Testlar soni</th>
                <th class="px-8 py-5 text-center">O‘rtacha ball</th>
            </tr></thead><tbody>`;

            html += `<tr class="border-b border-slate-700">
                <td class="px-8 py-6">Azizbek Rahmanov</td>
                <td class="px-8 py-6">3-kurs</td>
                <td class="px-8 py-6 text-center">${testHistory.length}</td>
                <td class="px-8 py-6 text-center font-bold text-cyan-400">${testHistory.length ? Math.round(testHistory.reduce((a,b)=>a+b.percent,0)/testHistory.length) : 0}%</td>
            </tr>`;

            html += `</tbody></table>`;
            document.getElementById('studentsTable').innerHTML = html;
        }

        function renderResults() {
            let html = `<div class="space-y-4">`;
            testHistory.forEach(item => {
                html += `
                    <div class="glass rounded-3xl p-8 flex justify-between items-center">
                        <div>
                            <div class="font-semibold">Azizbek Rahmanov</div>
                            <div class="text-sm text-slate-400">${item.date}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-4xl font-bold text-cyan-400">${item.percent}%</div>
                            <div class="text-sm">${item.score} / 20 ball</div>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            document.getElementById('resultsList').innerHTML = html || '<p class="text-slate-400 text-center py-12">Hali hech qanday test topshirilmagan</p>';
        }

        function logout() {
            if (confirm("Chiqishni xohlaysizmi?")) {
                localStorage.removeItem('instsu_current_user');
                window.location.href = "login.html";
            }
        }

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('instsu_current_user'));
            if (!user || user.role !== "admin") {
                alert("Bu sahifaga faqat admin kirishi mumkin!");
                window.location.href = "login.html";
                return;
            }
            renderDashboard();
            renderStudents();
            renderResults();
        };
    </script>
</body>
</html>
