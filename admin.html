<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTSU • Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        * { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .glass {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(103, 232, 249, 0.3);
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-black text-slate-200 flex min-h-screen">

    <!-- Sidebar -->
    <div class="sidebar w-72 min-h-screen p-6 border-r border-slate-700 flex flex-col">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex items-center justify-center text-2xl">📘</div>
            <div class="title-font text-3xl font-bold">INSTSU Admin</div>
        </div>

        <div class="space-y-2 flex-1">
            <a href="#" onclick="showSection('dashboard')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all active">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>
            <a href="#" onclick="showSection('students')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">
                <i class="fa-solid fa-users"></i> Talabalar
            </a>
            <a href="#" onclick="showSection('results')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">
                <i class="fa-solid fa-chart-bar"></i> Natijalar
            </a>
            <a href="#" onclick="showSection('ranking')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-cyan-400/10 transition-all">
                <i class="fa-solid fa-trophy"></i> Reyting
            </a>
        </div>

        <button onclick="logout()" 
                class="w-full py-4 bg-red-500/10 hover:bg-red-500 hover:text-white rounded-2xl flex items-center justify-center gap-3 text-sm font-medium transition-all mt-8">
            <i class="fa-solid fa-right-from-bracket"></i> Chiqish
        </button>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8">

        <!-- Dashboard -->
        <div id="dashboard" class="section active">
            <h1 class="title-font text-5xl font-bold mb-10">Admin Dashboard</h1>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass rounded-3xl p-8">
                    <div class="text-5xl font-bold">248</div>
                    <div class="text-slate-400">Jami talabalar</div>
                </div>
                <div class="glass rounded-3xl p-8">
                    <div class="text-5xl font-bold">124</div>
                    <div class="text-slate-400">Bugun test topshirildi</div>
                </div>
                <div class="glass rounded-3xl p-8">
                    <div class="text-5xl font-bold">87%</div>
                    <div class="text-slate-400">O‘rtacha natija</div>
                </div>
                <div class="glass rounded-3xl p-8">
                    <div class="text-5xl font-bold">12</div>
                    <div class="text-slate-400">Faol foydalanuvchilar</div>
                </div>
            </div>
        </div>

        <!-- Talabalar -->
        <div id="students" class="section hidden">
            <h2 class="title-font text-4xl font-bold mb-8">Talabalar ro‘yxati</h2>
            <div class="glass rounded-3xl overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-800">
                        <tr>
                            <th class="px-8 py-5 text-left">Ism</th>
                            <th class="px-8 py-5 text-left">Kurs</th>
                            <th class="px-8 py-5 text-left">Email</th>
                            <th class="px-8 py-5 text-center">Testlar</th>
                            <th class="px-8 py-5 text-center">O‘rtacha ball</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTable" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- Natijalar -->
        <div id="results" class="section hidden">
            <h2 class="title-font text-4xl font-bold mb-8">Barcha imtihon natijalari</h2>
            <div id="resultsList" class="space-y-4"></div>
        </div>

        <!-- Reyting -->
        <div id="ranking" class="section hidden">
            <h2 class="title-font text-4xl font-bold mb-8">Umumiy Reyting</h2>
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-xl text-slate-400">Reyting jadvali (demo versiya)</p>
            </div>
        </div>
    </div>

    <script>
        const demoStudents = [
            {name:"Azizbek Rahmanov", kurs:"3-kurs", email:"azizbek@instsu.uz", tests:15, avg:94},
            {name:"Madina Karimova", kurs:"4-kurs", email:"madina@instsu.uz", tests:18, avg:97},
            {name:"Shoxrux Juraev", kurs:"2-kurs", email:"shoxrux@instsu.uz", tests:10, avg:82},
        ];

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(section).classList.remove('hidden');
        }

        function renderStudents() {
            const tbody = document.getElementById('studentsTable');
            tbody.innerHTML = demoStudents.map(s => `
                <tr class="border-b border-slate-700 hover:bg-slate-800/50">
                    <td class="px-8 py-6">${s.name}</td>
                    <td class="px-8 py-6">${s.kurs}</td>
                    <td class="px-8 py-6">${s.email}</td>
                    <td class="px-8 py-6 text-center">${s.tests}</td>
                    <td class="px-8 py-6 text-center font-bold text-cyan-400">${s.avg}%</td>
                </tr>
            `).join('');
        }

        function logout() {
            if (confirm("Admin paneldan chiqishni xohlaysizmi?")) {
                localStorage.removeItem('instsu_current_user');
                window.location.href = "login.html";
            }
        }

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('instsu_current_user'));
            if (!user || user.role !== "admin") {
                alert("Bu sahifaga faqat admin kirishi mumkin!");
                window.location.href = "login.html";
                return;
            }
            renderStudents();
            showSection('dashboard');
        };
    </script>
</body>
</html>
