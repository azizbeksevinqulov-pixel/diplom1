<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestZamon - Asosiy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-3xl flex items-center justify-center text-3xl">📝</div>
                <h1 class="text-3xl font-bold">TestZamon</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div id="userInfo" onclick="showProfile()" class="flex items-center gap-3 cursor-pointer">
                    <div id="userAvatar" class="w-9 h-9 bg-cyan-400 text-slate-900 rounded-2xl flex items-center justify-center font-bold"></div>
                    <div>
                        <span id="displayName" class="font-semibold"></span>
                    </div>
                </div>
                <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 px-6 py-3 rounded-3xl text-sm font-medium flex items-center gap-2">
                    <i class="fa-solid fa-right-from-bracket"></i> Chiqish
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-5xl font-bold mb-4">Salom, <span id="welcomeName" class="text-cyan-400"></span>!</h1>
        <p class="text-xl text-slate-400 mb-12">Fanlardan test topshirib, darhol natijangizni ko‘ring</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="subjectsGrid">
            <!-- JavaScript orqali to‘ldiriladi -->
        </div>
    </div>

    <!-- Quiz, Natija va boshqa bo‘limlar shu yerga qo‘shiladi (oldingi versiyadan) -->
    <!-- Qo‘shimcha bo‘limlarni to‘liq qilish uchun oldingi kodni ham qo‘shing yoki kerak bo‘lsa ayting -->

    <script>
        let currentUser = null;

        function loadUser() {
            const saved = localStorage.getItem('testzamon_current_user');
            if (!saved) {
                window.location.href = "login.html";
                return;
            }
            currentUser = JSON.parse(saved);
            
            document.getElementById('displayName').textContent = currentUser.fullName || currentUser.username;
            document.getElementById('welcomeName').textContent = currentUser.fullName ? currentUser.fullName.split(' ')[0] : currentUser.username;
            document.getElementById('userAvatar').textContent = (currentUser.fullName || currentUser.username)[0].toUpperCase();
        }

        function logout() {
            if (confirm("Chiqishni xohlaysizmi?")) {
                localStorage.removeItem('testzamon_current_user');
                window.location.href = "login.html";
            }
        }

        function showProfile() {
            alert(`Ism: ${currentUser.fullName}\nUsername: ${currentUser.username}\nEmail: ${currentUser.email}\nSinfi: ${currentUser.class}`);
        }

        // Oddiy misol uchun fanlar
        const subjects = [
            { name: "Matematika", icon: "📐" },
            { name: "Fizika", icon: "⚡" },
            { name: "Kimyo", icon: "🧪" }
        ];

        function renderSubjects() {
            const container = document.getElementById('subjectsGrid');
            container.innerHTML = subjects.map(s => `
                <div onclick="startTest('${s.name}')" 
                     class="bg-slate-900 border border-slate-700 hover:border-cyan-400 rounded-3xl p-8 cursor-pointer text-center">
                    <div class="text-6xl mb-4">${s.icon}</div>
                    <h3 class="text-2xl font-semibold">${s.name}</h3>
                    <p class="text-slate-400 mt-2">Testni boshlash</p>
                </div>
            `).join('');
        }

        function startTest(subject) {
            alert(`${subject} fani bo‘yicha test boshlandi!\n\n(Bu yerda to‘liq test logikasi bo‘ladi)`);
            // Bu yerga oldingi quiz kodini qo‘shishingiz mumkin
        }

        window.onload = () => {
            loadUser();
            renderSubjects();
        };
    </script>
</body>
</html>
