<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Talaba Asosiy Sahifa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-gray-900 via-indigo-900 to-purple-900 min-h-screen text-white font-[Space Grotesk]">
  <div class="p-10">
    <h1 id="greeting" class="text-4xl mb-8"></h1>
    <div class="grid md:grid-cols-3 gap-6">
      <div class="bg-white/10 backdrop-blur-lg p-6 rounded-xl hover:scale-105 transition">
        <h2 class="text-xl mb-4">Axborot xavfsizligi</h2>
        <p>Axborot tizimlari xavfsizligi bo‘yicha bilimlar.</p>
      </div>
      <div class="bg-white/10 backdrop-blur-lg p-6 rounded-xl hover:scale-105 transition">
        <h2 class="text-xl mb-4">Big Data</h2>
        <p>Katta ma’lumotlar tahlili va ishlov berish.</p>
      </div>
      <div class="bg-white/10 backdrop-blur-lg p-6 rounded-xl hover:scale-105 transition">
        <h2 class="text-xl mb-4">Xorijiy til</h2>
        <p>Ingliz tili bilimlarini mustahkamlash.</p>
      </div>
    </div>
    <button onclick="goExam()" class="mt-10 bg-gradient-to-r from-cyan-500 to-purple-600 py-3 px-6 rounded-lg hover:scale-105 transition">Imtihon bo‘limiga o‘tish</button>
  </div>

  <script>
    const name = localStorage.getItem("name");
    document.getElementById("greeting").innerText = "Salom, " + name + "!";

    function goExam() {
      window.location.href = "savollar.html";
    }
  </script>
</body>
</html>
