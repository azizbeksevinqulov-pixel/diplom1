<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>INSTSU Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-900 via-purple-900 to-cyan-900 min-h-screen flex items-center justify-center font-[Space Grotesk]">
  <div class="bg-white/10 backdrop-blur-lg p-10 rounded-2xl shadow-xl w-96">
    <h1 class="text-3xl text-center text-cyan-300 mb-6">Kirish</h1>
    <input id="login" type="text" placeholder="Login" class="w-full mb-4 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none">
    <input id="password" type="password" placeholder="Parol" class="w-full mb-6 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none">
    <button onclick="doLogin()" class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 text-white py-3 rounded-lg hover:scale-105 transition">Kirish</button>
    <p id="error" class="text-red-400 text-center mt-4 hidden">Login yoki parol noto‘g‘ri!</p>
  </div>

  <script>
    function doLogin() {
      const login = document.getElementById("login").value;
      const password = document.getElementById("password").value;

      if (login === "admin" && password === "admin123") {
        localStorage.setItem("role", "admin");
        window.location.href = "admin.html";
      } else if (login === "azizbek" && password === "123456") {
        localStorage.setItem("role", "student");
        localStorage.setItem("name", "Azizbek");
        window.location.href = "index.html";
      } else {
        document.getElementById("error").classList.remove("hidden");
      }
    }
  </script>
</body>
</html>
