<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Imtihon Savollari</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-gray-900 via-purple-900 to-indigo-900 min-h-screen text-white font-[Space Grotesk]">
  <div class="p-10">
    <h1 class="text-3xl mb-6">Imtihon</h1>
    <div id="subjectSelect" class="grid md:grid-cols-3 gap-6">
      <div onclick="startExam('Axborot xavfsizligi')" class="cursor-pointer bg-white/10 p-6 rounded-xl hover:scale-105 transition">Axborot xavfsizligi</div>
      <div onclick="startExam('Big Data')" class="cursor-pointer bg-white/10 p-6 rounded-xl hover:scale-105 transition">Big Data</div>
      <div onclick="startExam('Xorijiy til')" class="cursor-pointer bg-white/10 p-6 rounded-xl hover:scale-105 transition">Xorijiy til</div>
    </div>

    <div id="examArea" class="hidden">
      <div class="flex justify-between mb-4">
        <div id="timer">20:00</div>
        <div class="w-1/2 bg-gray-700 rounded-full">
          <div id="progress" class="bg-cyan-500 h-3 rounded-full" style="width:0%"></div>
        </div>
      </div>
      <div id="questionBox" class="bg-white/10 p-6 rounded-xl"></div>
    </div>

    <div id="resultArea" class="hidden text-center">
      <h2 class="text-3xl mb-4">Natija</h2>
      <p id="score"></p>
    </div>
  </div>

  <script>
    let questions = [];
    let current = 0;
    let correct = 0;
    let timer;
    let timeLeft = 1200; // 20 min

    function startExam(subject) {
      document.getElementById("subjectSelect").classList.add("hidden");
      document.getElementById("examArea").classList.remove("hidden");
      generateQuestions(subject);
      showQuestion();
      startTimer();
    }

    function generateQuestions(subject) {
      questions = [];
      for (let i=1; i<=20; i++) {
        questions.push({
          q: subject + " savol " + i,
          options: ["Variant A","Variant B","Variant C","Variant D"],
          answer: 0
        });
      }
    }

    function showQuestion() {
      if (current >= questions.length) {
        finishExam();
        return;
      }
      const q = questions[current];
      let html = `<h3 class="text-xl mb-4">${q.q}</h3>`;
      q.options.forEach((opt,i)=>{
        html += `<div onclick="choose(${i})" class="cursor-pointer bg-white/20 p-3 rounded-lg mb-2 hover:bg-cyan-600 transition">${opt}</div>`;
      });
      document.getElementById("questionBox").innerHTML = html;
      document.getElementById("progress").style.width = ((current/questions.length)*100)+"%";
    }

    function choose(i) {
      if (i===questions[current].answer) correct++;
      current++;
      setTimeout(showQuestion,900);
    }

    function finishExam() {
      document.getElementById("examArea").classList.add("hidden");
      document.getElementById("resultArea").classList.remove("hidden");
      const percent = Math.round((correct/questions.length)*100);
      const grade = percent>=90?"A":percent>=75?"B":percent>=60?"C":"F";
      document.getElementById("score").innerText = `Foiz: ${percent}% | Baho: ${grade}`;
      localStorage.setItem("lastResult", percent);
    }

    function startTimer() {
      timer = setInterval(()=>{
        timeLeft--;
        let min = Math.floor(timeLeft/60);
        let sec = timeLeft%60;
        document.getElementById("timer").innerText = `${min}:${sec<10?"0":""}${sec}`;
        if (timeLeft<=0) finishExam();
      },1000);
    }
  </script>
</body>
</html>
