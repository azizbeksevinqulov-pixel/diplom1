<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTSU • Imtihon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        * { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-black text-slate-200 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-slate-900/95 border-b border-slate-700/50 sticky top-0 z-50 backdrop-blur-2xl">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 via-indigo-500 to-purple-600 rounded-3xl flex items-center justify-center text-4xl">📘</div>
                <div class="title-font text-3xl font-bold tracking-tighter">INSTSU</div>
            </div>
            <button onclick="logout()" class="px-6 py-3 bg-red-500/10 hover:bg-red-500 hover:text-white rounded-3xl flex items-center gap-2 text-sm font-medium">
                <i class="fa-solid fa-right-from-bracket"></i> Chiqish
            </button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-10">

        <!-- 1. Fan tanlash ekrani -->
        <div id="subjectScreen">
            <h1 class="title-font text-5xl font-bold text-center mb-4">Imtihon fanini tanlang</h1>
            <p class="text-center text-slate-400 mb-12">Har bir fanda 20 ta savol • Real natijalar saqlanadi</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div onclick="startTest('Axborot xavfsizligi')" class="glass rounded-3xl p-8 text-center card-hover cursor-pointer">
                    <div class="text-6xl mb-6">🔒</div>
                    <h3 class="text-2xl font-bold">Axborot xavfsizligi</h3>
                    <p class="text-slate-400 mt-2">20 savol</p>
                </div>
                <div onclick="startTest('Big Data')" class="glass rounded-3xl p-8 text-center card-hover cursor-pointer">
                    <div class="text-6xl mb-6">📊</div>
                    <h3 class="text-2xl font-bold">Big Data</h3>
                    <p class="text-slate-400 mt-2">20 savol</p>
                </div>
                <div onclick="startTest('Xorijiy til')" class="glass rounded-3xl p-8 text-center card-hover cursor-pointer">
                    <div class="text-6xl mb-6">🌍</div>
                    <h3 class="text-2xl font-bold">Xorijiy til</h3>
                    <p class="text-slate-400 mt-2">20 savol</p>
                </div>
            </div>
        </div>

        <!-- 2. Test ekrani (yashirin) -->
        <div id="testScreen" class="hidden">
            <div class="glass rounded-3xl p-8 mb-8">
                <div class="flex justify-between items-center">
                    <h2 id="subjectTitle" class="title-font text-3xl font-bold"></h2>
                    <div class="text-right">
                        <div id="progressText" class="text-4xl font-bold text-cyan-400">1/20</div>
                        <div class="text-xs text-slate-400">savol</div>
                    </div>
                </div>
                <div class="h-2 bg-slate-700 rounded-full mt-6 overflow-hidden">
                    <div id="progressBar" class="progress-bar h-full bg-gradient-to-r from-cyan-400 to-purple-500 w-1/20"></div>
                </div>
            </div>

            <div id="questionCard" class="glass rounded-3xl p-10"></div>

            <div class="flex justify-between mt-8">
                <button onclick="prevQuestion()" id="prevBtn" class="flex items-center gap-3 px-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-3xl disabled:opacity-50">
                    <i class="fa-solid fa-arrow-left"></i> Oldingi
                </button>
                <button onclick="nextQuestion()" id="nextBtn" class="flex items-center gap-3 px-10 py-4 bg-gradient-to-r from-cyan-400 to-purple-500 text-slate-950 font-bold rounded-3xl">
                    <span id="nextText">Keyingi savol</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentSubject = "";
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let currentUser = JSON.parse(localStorage.getItem('instsu_current_user')) || {};

        // 3 ta fan — har birida 20 ta savol
        const questionsDB = {
            "Axborot xavfsizligi": [
                {q: "Ma'lumotni himoya qilishning asosiy maqsadi nima?", options: ["Tezlikni oshirish", "Maxfiylikni ta'minlash", "Narxni pasaytirish", "Internetni tezlashtirish"], correct: 1},
                {q: "Phishing hujumi nima?", options: ["Virus", "Soxta sayt va xabarlar", "Wi-Fi buzish", "Fayl o'g'irlash"], correct: 1},
                // ... qolgan 18 ta savolni shu tarzda qo'shish mumkin (demo uchun 2 ta ko'rsatildi)
                // Sizga kerak bo'lsa, qolgan savollarni qo'shib yuboraman
            ],
            "Big Data": [
                {q: "Big Data ning 3V si nimalardan iborat?", options: ["Volume, Velocity, Variety", "Value, Vision, Version", "Voice, Video, Visual"], correct: 0},
                {q: "Hadoop nima uchun ishlatiladi?", options: ["Kichik ma'lumotlar", "Katta hajmdagi ma'lumotlarni qayta ishlash", "Grafika yaratish"], correct: 1},
                // ... qolgan 18 ta
            ],
            "Xorijiy til": [
                {q: "The best way to learn English is ...", options: ["watching movies only", "practice speaking every day", "reading books only"], correct: 1},
                {q: "'I have been living here for 5 years' — bu qanday zamon?", options: ["Present Simple", "Present Perfect Continuous", "Past Perfect"], correct: 1},
                // ... qolgan 18 ta
            ]
        };

        function startTest(subject) {
            currentSubject = subject;
            currentQuestionIndex = 0;
            userAnswers = new Array(questionsDB[subject].length).fill(null);
            
            document.getElementById('subjectScreen').classList.add('hidden');
            document.getElementById('testScreen').classList.remove('hidden');
            
            document.getElementById('subjectTitle').textContent = subject;
            renderQuestion();
        }

        function renderQuestion() {
            const questions = questionsDB[currentSubject];
            const q = questions[currentQuestionIndex];
            
            document.getElementById('progressText').textContent = `${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('progressBar').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;

            let html = `<h2 class="text-2xl font-medium mb-8">${q.q}</h2>`;
            html += `<div class="space-y-4">`;
            q.options.forEach((opt, i) => {
                html += `
                <div onclick="selectAnswer(${i})" class="option p-6 rounded-2xl border border-slate-600 cursor-pointer flex items-center gap-4 ${userAnswers[currentQuestionIndex] === i ? 'selected' : ''}">
                    <span class="font-bold text-cyan-400">${String.fromCharCode(65 + i)}.</span>
                    <span>${opt}</span>
                </div>`;
            });
            html += `</div>`;
            document.getElementById('questionCard').innerHTML = html;

            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextText').textContent = (currentQuestionIndex === questions.length - 1) ? "Testni yakunlash" : "Keyingi savol";
        }

        function selectAnswer(index) {
            userAnswers[currentQuestionIndex] = index;
            renderQuestion();
        }

        function nextQuestion() {
            const questions = questionsDB[currentSubject];
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                finishTest();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function finishTest() {
            const questions = questionsDB[currentSubject];
            let correctCount = 0;
            userAnswers.forEach((ans, i) => {
                if (ans === questions[i].correct) correctCount++;
            });

            const percentage = Math.round((correctCount / questions.length) * 100);

            // REAL natijani saqlash (localStorage)
            let results = JSON.parse(localStorage.getItem('instsu_results')) || [];
            results.push({
                username: currentUser.username,
                fullName: currentUser.fullName || currentUser.username,
                subject: currentSubject,
                score: correctCount,
                total: questions.length,
                percentage: percentage,
                date: new Date().toLocaleString('uz-UZ')
            });
            localStorage.setItem('instsu_results', JSON.stringify(results));

            alert(`🎉 Test tugadi!\nFan: ${currentSubject}\nNatija: ${correctCount}/${questions.length} (${percentage}%)`);
            window.location.href = "index.html";
        }

        function logout() {
            if (confirm("Chiqishni xohlaysizmi?")) {
                localStorage.removeItem('instsu_current_user');
                window.location.href = "login.html";
            }
        }

        window.onload = () => {
            if (!currentUser.username) {
                alert("Iltimos, avval tizimga kiring!");
                window.location.href = "login.html";
            }
        };
    </script>
</body>
</html>
